<!DOCTYPE html>
<html lang="en">
<head>
	<title>Premium Cinema Formats | Lists | Shrey Tyagi</title>

	<!-- Bootstrap CSS -->
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">	
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

	<!-- JQuery -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
	
	<!-- Botstrap JS -->
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
	
	<!-- Local CSS -->
	<link href="/css/style.css" rel="stylesheet">

	<!-- Local JS -->
	<script src="/js/script.js"></script>

	<!-- YouTube JS -->
	<script src="https://apis.google.com/js/platform.js"></script>

    <style>
        /* Format Logo Image Styling */
        .format-logo {
            height: 80px;
            width: auto; 
            max-width: 100%; 
            object-fit: contain; 
            display: block;
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;" data-master-category="">

    <!-- Navbar will be loaded here -->
    <div id="navbar-container"></div>

    <div class="container mt-1 text-justify flex-grow-1">

        <div class="content-container">
            <h3>Premium Large Formats</h3>
            <p>Select a cinema format from the dropdown below to view its respective logo and complete list of locations.</p>
            
            <!-- Format Selector Dropdown -->
            <div class="form-group mt-4">
                <select class="form-control border-dark font-weight-bold" id="formatSelector" style="max-width: 350px; cursor: pointer;">
                    <option value="" selected disabled>-- Choose a Format --</option>
                    <option value="pxl">P[XL]</option>
                    <option value="bigpix">BigPix</option>
                    <option value="epiq">EPIQ</option>
                    <option value="screenx">ScreenX</option>
                </select>
            </div>

            <!-- Dynamic Image Container -->
            <div id="formatImageContainer" class="mt-4 mb-4" style="display: none;">
                <img id="formatImage" src="" alt="Cinema Format Logo" class="format-logo">
            </div>
        </div>
        
        <!-- SINGLE Dynamic Table Wrapper -->
        <div id="table-wrapper" class="format-list-section" style="display: none;">
            <!-- Note: csvfile is left empty so script.js doesn't try to process it on load -->
            <div class="table-container" id="main-table-container" csvfile="" fullwidth="false" sortcolumn="0" sortorder="asc">
                <table id="dynamic-table" class="w-100 table table-striped">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div>
	
	<div id="footer-container">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark nav-bottom">
            <div class="container">
                <div class="navbar-collapse">
                    <ul class="navbar-nav mr-auto">
                        <li class="nav-item">
                            <a class="nav-link disabled" href="#" id="current-year">
                                Copyright © 2027 by Shrey Tyagi. All rights reserved.
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <!-- Dropdown Interaction & CSV Loading Logic -->
    <script>
        $(document).ready(function() {
            // Using the exact file paths you provided
            const plfData = {
                'pxl': { csv: '/data/plf_pxl.csv', img: '/data/plf_pxl.png' },
                'bigpix': { csv: '/data/bigpix.csv', img: '/data/bigpix.png' },
                'epiq': { csv: '/data/epic.csv', img: '/data/epic.png' },
                'screenx': { csv: '/data/screenx.csv', img: '/data/screenx.png' }
            };

            // Custom CSV line parser to handle basic data safely
            function parseCSVRow(str) {
                let arr = [];
                let quote = false;
                let col = '';
                for (let i = 0; i < str.length; i++) {
                    let cc = str[i], nc = str[i+1];
                    if (cc === '"' && quote && nc === '"') { col += cc; ++i; continue; }
                    if (cc === '"') { quote = !quote; continue; }
                    if (cc === ',' && !quote) { arr.push(col.trim()); col = ''; continue; }
                    col += cc;
                }
                arr.push(col.trim());
                return arr;
            }

            $('#formatSelector').on('change', function() {
                const selectedFormat = $(this).val();
                const formatInfo = plfData[selectedFormat];
                
                if (formatInfo) {
                    // 1. Show the logo
                    $('#formatImage').attr('src', formatInfo.img);
                    $('#formatImageContainer').fadeIn(300);
                    
                    // 2. Show the single table wrapper
                    $('#table-wrapper').show();
                    
                    // 3. Clear existing table data to prevent lingering empty space and show loading
                    $('#dynamic-table thead').empty();
                    $('#dynamic-table tbody').html('<tr><td class="text-center py-4">Loading format locations...</td></tr>');
                    
                    // 4. Fetch the selected CSV dynamically and build the table
                    $.ajax({
                        url: formatInfo.csv,
                        dataType: 'text',
                        success: function(data) {
                            let lines = data.split(/\r?\n/);
                            if(lines.length === 0) return;
                            
                            // Build Headers
                            let theadHTML = '<tr>';
                            let headers = parseCSVRow(lines[0]);
                            for(let i=0; i<headers.length; i++) {
                                theadHTML += '<th>' + headers[i] + '</th>';
                            }
                            theadHTML += '</tr>';
                            
                            // Build Rows
                            let tbodyHTML = '';
                            for(let i=1; i<lines.length; i++) {
                                let line = lines[i].trim();
                                if(line === '') continue;
                                
                                let cells = parseCSVRow(line);
                                tbodyHTML += '<tr>';
                                for(let j=0; j<cells.length; j++) {
                                    tbodyHTML += '<td>' + cells[j] + '</td>';
                                }
                                tbodyHTML += '</tr>';
                            }
                            
                            // Inject directly into the DOM
                            $('#dynamic-table thead').html(theadHTML);
                            $('#dynamic-table tbody').html(tbodyHTML);
                        },
                        error: function() {
                            $('#dynamic-table tbody').html('<tr><td class="text-center text-danger py-4">Error loading data. Please ensure the CSV file is uploaded.</td></tr>');
                        }
                    });
                }
            });
        });
    </script>

</body>
</html>
