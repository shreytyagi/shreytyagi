<!DOCTYPE html>
<html lang="en">
<head>
	<title>Premium Cinema Formats | Lists | Shrey Tyagi</title>

	<!-- Bootstrap CSS -->
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">	
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

	<!-- JQuery -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
	
	<!-- Botstrap JS -->
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
	
	<!-- Local CSS -->
	<link href="/css/style.css" rel="stylesheet">

	<!-- Local JS -->
	<script src="/js/script.js"></script>

	<!-- YouTube JS -->
	<script src="https://apis.google.com/js/platform.js"></script>

    <style>
        /* Format Logo Image Styling */
        .format-logo {
            height: 80px;
            width: auto; 
            max-width: 100%; 
            object-fit: contain; 
            display: block;
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;" data-master-category="">

    <!-- Navbar will be loaded here -->
    <div id="navbar-container"></div>

    <div class="container mt-1 text-justify flex-grow-1">

        <div class="content-container">
            <h3>Premium Large Formats</h3>
            <p>Select a cinema format from the dropdown below to view its respective logo and complete list of locations.</p>
            
            <!-- Format Selector Dropdown -->
            <div class="form-group mt-4">
                <select class="form-control border-dark font-weight-bold" id="formatSelector" style="max-width: 350px; cursor: pointer;">
                    <option value="" selected disabled>-- Choose a Format --</option>
                    <option value="pxl">P[XL]</option>
                    <option value="bigpix">BigPix</option>
                    <option value="epiq">EPIQ</option>
                    <option value="screenx">ScreenX</option>
                </select>
            </div>

            <!-- Dynamic Image Container -->
            <div id="formatImageContainer" class="mt-4 mb-4" style="display: none;">
                <img id="formatImage" src="" alt="Cinema Format Logo" class="format-logo">
            </div>
        </div>
        
        <!-- P[XL] Table -->
        <div id="table-pxl" class="format-list-section" style="display: none;">
            <div class="table-container" csvfile="/data/cinemas/plf/pxl.csv" fullwidth="false" sortcolumn="0" sortorder="asc">
                <table id="dynamic-table-pxl" class="w-100">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- BigPix Table -->
        <div id="table-bigpix" class="format-list-section" style="display: none;">
            <div class="table-container" csvfile="/data/cinemas/plf/bigpix.csv" fullwidth="false" sortcolumn="0" sortorder="asc">
                <table id="dynamic-table-bigpix" class="w-100">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- EPIQ Table -->
        <div id="table-epiq" class="format-list-section" style="display: none;">
            <div class="table-container" csvfile="/data/cinemas/plf/epiq.csv" fullwidth="false" sortcolumn="0" sortorder="asc">
                <table id="dynamic-table-epiq" class="w-100">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- ScreenX Table -->
        <div id="table-screenx" class="format-list-section" style="display: none;">
            <div class="table-container" csvfile="/data/cinemas/plf/screenx.csv" fullwidth="false" sortcolumn="0" sortorder="asc">
                <table id="dynamic-table-screenx" class="w-100">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div>
	
	<div id="footer-container">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark nav-bottom">
            <div class="container">
                <div class="navbar-collapse">
                    <ul class="navbar-nav mr-auto">
                        <li class="nav-item">
                            <a class="nav-link disabled" href="#" id="current-year">
                                Copyright © 2027 by Shrey Tyagi. All rights reserved.
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <!-- Dropdown Interaction Logic -->
    <script>
        $(document).ready(function() {
            const formatImages = {
                'pxl': '/data/cinemas/plf/pxl.png',
                'bigpix': '/data/cinemas/plf/bigpix.png',
                'epiq': '/data/cinemas/plf/epiq.png',
                'screenx': '/data/cinemas/plf/screenx.png'
            };

            $('#formatSelector').on('change', function() {
                const selectedFormat = $(this).val();
                
                if (formatImages[selectedFormat]) {
                    $('#formatImage').attr('src', formatImages[selectedFormat]);
                    $('#formatImageContainer').show();
                } else {
                    $('#formatImageContainer').hide();
                }

                $('.format-list-section').css('display', 'none');
                $('#table-' + selectedFormat).fadeIn(300);
            });
        });
    </script>

</body>
</html>
